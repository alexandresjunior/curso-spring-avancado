spring.application.name=procardio-api

# ==============================================================================
# CONFIGURAÇÕES DE CONEXÃO COM BANCO DE DADOS (MySQL)
# ==============================================================================

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/procardio_db
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.show-sql: true

# ==============================================================================
# CONFIGURAÇÕES SPRING SECURITY (JWT)
# ==============================================================================

api.security.token.secret=${API_TOKEN_SECRET}

# ==============================================================================
# CONFIGURAÇÕES GOOGLE OAUTH2
# ==============================================================================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ==============================================================================
# CONFIGURAÇÕES DO RABBITMQ (MENSAGERIA)
# ==============================================================================

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Nome da Exchange onde publicaremos os eventos de domínio
# Usamos uma Topic Exchange para permitir flexibilidade de roteamento no futuro
app.rabbitmq.exchange.eventos=procardio.v1.events
