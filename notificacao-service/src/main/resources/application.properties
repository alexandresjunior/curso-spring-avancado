spring.application.name=notificacao-service
server.port=8081

# ==============================================================================
# CONFIGURAÇÕES DE EMAIL (MAILTRAP)
# ==============================================================================

spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=25
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.remetente=noreply@treinarecife.com.br

# ==============================================================================
# CONFIGURAÇÕES DO RABBITMQ (MENSAGERIA)
# ==============================================================================

# spring.rabbitmq.host=localhost
spring.rabbitmq.host=192.168.15.15
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Habilita retentativas simples no listener (3 tentativas antes de desistir/DLQ)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-retries=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms